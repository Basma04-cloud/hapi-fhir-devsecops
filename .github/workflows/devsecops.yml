name: DevSecOps Pipeline - HAPI FHIR

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:

  # ============================================================
  # ETAPE 1 : BUILD MAVEN
  # ============================================================
  build:
    name: Build Maven
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-war
          path: target/ROOT.war

  # ============================================================
  # ETAPE 2 : GITLEAKS - Scan de secrets
  # ============================================================
  secrets-scan:
    name: Secrets Scan - GitLeaks
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: results.sarif

  # ============================================================
  # ETAPE 3 : SEMGREP - Analyse statique SAST
  # ============================================================
  sast-scan:
    name: SAST Scan - Semgrep
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (SAST)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/java
        continue-on-error: true

  # ============================================================
  # ETAPE 4 : OWASP - Analyse des dependances
  # ============================================================
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run OWASP Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -Dformat=ALL \
            -DoutputDirectory=reports/
        continue-on-error: true

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: reports/

  # ============================================================
  # ETAPE 5 : TRIVY - Scan de l'image Docker Alpine
  # ============================================================
  container-scan:
    name: Container Scan - Trivy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (Alpine - target default)
        run: docker build --target default -t hapi-fhir:${{ github.sha }} .

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hapi-fhir:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          timeout: 20m
        continue-on-error: true

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.sarif

  # ============================================================
  # ETAPE 6 : DEPLOY - uniquement si tous les scans passent
  # ============================================================
  deploy:
    name: Deploy - Docker
    runs-on: ubuntu-latest
    needs: [secrets-scan, sast-scan, dependency-check, container-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (Alpine - target default)
        run: docker build --target default -t hapi-fhir:latest .

      - name: Run container
        run: |
          docker run -d \
            --name hapi-fhir \
            -p 8080:8080 \
            hapi-fhir:latest

      - name: Wait for app to start
        run: |
          echo "Attente du demarrage de HAPI FHIR..."
          sleep 90

      - name: Health check with retry
        run: |
          for i in 1 2 3 4 5; do
            echo "Tentative $i..."
            curl -f http://localhost:8080/fhir/metadata && echo "App UP !" && exit 0
            sleep 30
          done
          echo "App non disponible apres 5 tentatives"
          docker logs hapi-fhir
          exit 1

      - name: Show container status
        if: always()
        run: |
          docker ps
          echo "Deploy reussi sur GitHub Actions !"