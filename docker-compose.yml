version: '3.7'

services:
  fhir:
    container_name: fhir
    image: "hapiproject/hapi:latest"
    ports:
      - "8090:8080"
    depends_on:
      - db

  db:
    image: postgres:14
    container_name: hapi-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_USER: admin
      POSTGRES_DB: hapi
    volumes:
      - hapi-postgres-data:/var/lib/postgresql/data

volumes:
  hapi-postgres-data: